<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Device Extractor</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☠️</text></svg>">

    <style>
        /* --- Dark Mode Theme Updates --- */
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px auto; 
            max-width: 1000px; 
            line-height: 1.6;
            background-color: #121212; /* Dark background */
            color: #e0e0e0; /* Light grey text */
            color-scheme: dark; /* Makes default scrollbars dark */
        }
        textarea.input-box { 
            width: 100%; 
            height: 200px; 
            margin-bottom: 10px; 
            font-family: monospace; 
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #444; /* Darker borders */
            border-radius: 4px;
            background-color: #1e1e1e; /* Dark inner background */
            color: #e0e0e0;
        }
        .btn-primary { 
            padding: 10px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            background-color: #0d6efd; /* Slightly brighter blue for contrast */
            color: white; 
            border: none; 
            border-radius: 4px; 
            transition: background 0.2s;
            margin-right: 10px;
        }
        .btn-primary:hover { 
            background-color: #0b5ed7; 
        }
        #output { 
            background: #1e1e1e; /* Dark background for results */
            padding: 15px; 
            border: 1px solid #444; 
            border-radius: 4px;
            min-height: 50px; 
            font-family: monospace; 
            font-size: 14px;
        }
        h4 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #66b2ff; /* Light blue so it's readable on dark grey */
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }
        h2 {
            color: #ffffff;
        }
        .section {
            margin-bottom: 20px;
        }

        /* --- CSS for the Side-by-Side Layout & Copy Buttons --- */
        .results-container {
            display: flex;
            gap: 15px; 
            margin-top: 10px;
        }
        .result-column {
            flex: 1; 
            display: flex;
            flex-direction: column;
        }
        
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .header-row h5 {
            margin: 0;
            color: #e0e0e0; /* Lighter text for headers */
        }
        
        .btn-copy {
            font-size: 12px;
            padding: 4px 10px;
            background-color: #b100cd; /* Custom purple color */
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-copy:hover {
            background-color: #8e00a4; /* Slightly darker purple on hover */
        }

        .result-column textarea {
            width: 100%;
            height: 400px; 
            font-family: monospace;
            font-size: 13px;
            border: 1px solid #444;
            border-radius: 4px;
            box-sizing: border-box;
            padding: 10px;
            resize: vertical;
            background-color: #1a1a1a; /* Even darker text area so text pops */
            color: #a5d6ff; /* Light blue tinted text for the raw commands */
            white-space: pre; 
        }
    </style>
</head>
<body>

    <h2>Network Log Extractor</h2>
    <p>Paste your raw device logs (CDP/LLDP outputs, etc.) or Inventory Tables below to extract Switches and Interfaces:</p>
    
    <textarea id="inputText" class="input-box" placeholder="Paste your log output or table here..."></textarea>
    <br>
    <button class="btn-primary" onclick="processText()">Extract Data</button>

    <h3>Result:</h3>
    <div id="output"><em>Awaiting input...</em></div>

    <script>
        function copyContent(elementId, btnElement) {
            const textToCopy = document.getElementById(elementId).value;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = "Copied!";
                btnElement.style.backgroundColor = "#198754"; // Green for success feedback
                
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.backgroundColor = ""; // Reverts to your custom purple
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
                alert("Failed to copy text to clipboard.");
            });
        }

        function processText() {
            const text = document.getElementById('inputText').value;
            
            // --- 1. Switch Extraction ---
            const switchRegex = /[a-zA-Z0-9\-]*(?:ACC|CAS)\d+/gi;
            let switchMatch;
            const switches = new Set();
            while ((switchMatch = switchRegex.exec(text)) !== null) { 
                switches.add(switchMatch[0].toUpperCase()); 
            }
            const sortedSwitches = Array.from(switches).sort();

            // --- 2. Interface Extraction ---
            const interfaces = new Set(); 
            
            // Format A: Standard CDP/LLDP (e.g., GigabitEthernet1/0/23 or Gi1/0/23)
            const ifaceRegex = /(?:gigabitethernet|gi)[^\d]*(\d+\/\d+\/\d+)/gi;
            let ifaceMatch;
            while ((ifaceMatch = ifaceRegex.exec(text)) !== null) { 
                interfaces.add("Gi" + ifaceMatch[1]); 
            }

            // Format B: Table/Inventory Format (e.g., PH-LSP-ACC0803 SW1    23)
            const tableRegex = /(?:ACC|CAS)\d+[\s\t]+SW(\d+)[\s\t]+(\d+)/gi;
            let tableMatch;
            while ((tableMatch = tableRegex.exec(text)) !== null) {
                interfaces.add(`Gi${tableMatch[1]}/0/${tableMatch[2]}`);
            }

            // Format C: Hyphenated Stack Format (e.g., PH-LSP-ACC0803-1 26)
            const hyphenRegex = /(?:ACC|CAS)\d+-(\d+)[\s\t]+(\d+)/gi;
            let hyphenMatch;
            while ((hyphenMatch = hyphenRegex.exec(text)) !== null) {
                interfaces.add(`Gi${hyphenMatch[1]}/0/${hyphenMatch[2]}`);
            }

            // Convert to Array and sort numerically
            const sortedInterfaces = Array.from(interfaces).sort((a, b) => {
                const partsA = a.substring(2).split('/').map(Number);
                const partsB = b.substring(2).split('/').map(Number);
                for (let i = 0; i < Math.max(partsA.length, partsB.length); i++) {
                    const numA = partsA[i] || 0;
                    const numB = partsB[i] || 0;
                    if (numA !== numB) { return numA - numB; }
                }
                return 0;
            });

            // --- 3. Output Generation ---
            let htmlOutput = "";
            const outputDiv = document.getElementById('output');

            // Switch Output Section
            htmlOutput += `<div class="section">`;
            htmlOutput += `<h4>Switches Found (Total: ${sortedSwitches.length})</h4>`;
            if (sortedSwitches.length > 0) {
                htmlOutput += sortedSwitches.join('<br>');
            } else {
                htmlOutput += `<em>No switches found containing 'ACC' or 'CAS'.</em>`;
            }
            htmlOutput += `</div>`;

            // Interface Output Section
            htmlOutput += `<div class="section">`;
            htmlOutput += `<h4>Interfaces Found (Total: ${sortedInterfaces.length})</h4>`;

            if (sortedInterfaces.length > 0) {
                const rawInterfacesText = sortedInterfaces.join('\n');
                const shRunText = sortedInterfaces.map(iface => `sh run int ${iface}`).join('\n');
                const shIntStatusText = sortedInterfaces.map(iface => `sh int ${iface} status`).join('\n');

                htmlOutput += `<div class="results-container">`;
                
                // Column 1
                htmlOutput += `<div class="result-column">`;
                htmlOutput += `  <div class="header-row">`;
                htmlOutput += `    <h5>Interfaces</h5>`;
                htmlOutput += `    <button class="btn-copy" onclick="copyContent('ta-interfaces', this)">Copy All</button>`;
                htmlOutput += `  </div>`;
                htmlOutput += `  <textarea id="ta-interfaces" readonly onclick="this.select()">${rawInterfacesText}</textarea>`;
                htmlOutput += `</div>`;

                // Column 2
                htmlOutput += `<div class="result-column">`;
                htmlOutput += `  <div class="header-row">`;
                htmlOutput += `    <h5>sh run int Gx/x/x</h5>`;
                htmlOutput += `    <button class="btn-copy" onclick="copyContent('ta-shrun', this)">Copy All</button>`;
                htmlOutput += `  </div>`;
                htmlOutput += `  <textarea id="ta-shrun" readonly onclick="this.select()">${shRunText}</textarea>`;
                htmlOutput += `</div>`;

                // Column 3
                htmlOutput += `<div class="result-column">`;
                htmlOutput += `  <div class="header-row">`;
                htmlOutput += `    <h5>sh int Gix/x/x status</h5>`;
                htmlOutput += `    <button class="btn-copy" onclick="copyContent('ta-shint', this)">Copy All</button>`;
                htmlOutput += `  </div>`;
                htmlOutput += `  <textarea id="ta-shint" readonly onclick="this.select()">${shIntStatusText}</textarea>`;
                htmlOutput += `</div>`;

                htmlOutput += `</div>`; 
            } else {
                htmlOutput += `<em>No interfaces found. Make sure the text contains standard formats or valid table data.</em>`;
            }
            htmlOutput += `</div>`;

            outputDiv.innerHTML = htmlOutput;
        }
    </script>

</body>
</html>
